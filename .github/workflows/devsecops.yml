name: Simple Pipeline

on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t myapp .

    - name: Scan Docker Image (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'myapp'
