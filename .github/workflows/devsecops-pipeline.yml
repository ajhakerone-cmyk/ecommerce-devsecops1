name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: SAST Scan with Bandit
      run: |
        bandit -r . -f html -o bandit-report.html || true
      continue-on-error: true

    - name: Upload Bandit Report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.html

    - name: Dependency Scan with Safety
      run: |
        safety check -r requirements.txt --json > safety-report.json || true
      continue-on-error: true

    - name: Upload Safety Report
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json

    - name: Build Docker image
      run: |
        docker build -t ecommerce:${{ github.sha }} .

    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Container Scan with Trivy
      run: |
        trivy image --severity CRITICAL,HIGH --no-progress ecommerce:${{ github.sha }}

  deploy-test-environment:
    name: Deploy Test Environment
    needs: security-scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t ecommerce-test:${{ github.sha }} .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name ecommerce-app ecommerce-test:${{ github.sha }}
        sleep 10

    - name: Verify container
      run: |
        curl -f http://localhost:5000/health

    - name: Run OWASP ZAP Scan
      run: |
        docker run -t zaproxy/zap-stable zap-baseline.py -t http://host.docker.internal:5000 || true

    - name: Cleanup
      if: always()
      run: |
        docker stop ecommerce-app
        docker rm ecommerce-app

  security-compliance-check:
    name: Security Compliance Check
    needs: [security-scanning, deploy-test-environment]
    runs-on: ubuntu-latest

    steps:
    - name: Security Summary
      run: |
        echo "DevSecOps security pipeline completed successfully."
